<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Tire Disposal & Distribution</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="brand">
      <span class="mark"></span>
      <span class="brand-name">TIRE DISPOSAL <span>&</span> DISTRIBUTION</span>
    </a>
    <div style="display:flex; align-items:center; gap:18px;">
      <span class="eyebrow" style="margin:0;">Owner Dashboard</span>
      <button id="logout-btn" class="btn btn-ghost" style="padding:9px 18px; font-size:0.85rem;">Log Out</button>
    </div>
  </div>
</header>

<div class="tread"></div>

<div class="page-head" style="padding-bottom:0; border-bottom:none;">
  <div class="wrap">
    <h1>Pickup Requests</h1>
    <p>Everything submitted through the booking form lands here.</p>
  </div>
</div>

<section style="padding-top:30px;">
  <div class="wrap">

    <div class="dash-stats">
      <div class="dash-stat">
        <span class="dash-stat-num" id="count-new">0</span>
        <span class="dash-stat-label">New</span>
      </div>
      <div class="dash-stat">
        <span class="dash-stat-num" id="count-scheduled">0</span>
        <span class="dash-stat-label">Scheduled</span>
      </div>
      <div class="dash-stat">
        <span class="dash-stat-num" id="count-completed">0</span>
        <span class="dash-stat-label">Completed</span>
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="new">New</button>
      <button class="filter-btn" data-filter="scheduled">Scheduled</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <div id="pickup-list" class="pickup-list"></div>
    <div id="empty-state" class="empty-state" style="display:none;">No pickup requests yet — they'll show up here as soon as someone books online.</div>

  </div>
</section>

<script src="js/dashboard.js"></script>
</body>
</html>
