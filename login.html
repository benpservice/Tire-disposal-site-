<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login | Tire Disposal & Distribution</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="brand" style="margin-bottom:26px;">
      <span class="mark"></span>
      <span class="brand-name">TIRE DISPOSAL <span>&</span> DISTRIBUTION</span>
    </div>
    <span class="eyebrow">Owner access</span>
    <h1 style="font-size:2.2rem; margin-bottom:8px;">Log in</h1>
    <p style="color:var(--charcoal); margin-bottom:26px;">Check pickup requests and update their status.</p>

    <form id="login-form">
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
      <div class="form-msg" id="login-msg"></div>
    </form>

    <a href="index.html" style="display:inline-block; margin-top:22px; font-family:var(--mono); font-size:0.82rem; color:var(--charcoal);">← Back to site</a>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
